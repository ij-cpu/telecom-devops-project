apiVersion: apps/v1
kind: Deployment
metadata:
  name: telecom-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telecom
  template:
    metadata:
      labels:
        app: telecom
    spec:
      containers:
        - name: telecom-container
          image: ishajoshi07/telecom-app
          imagePullPolicy: Always
          ports:
          
            - containerPort: 5000